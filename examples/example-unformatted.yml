tasks:
  # tasks section
  build:
    cmds:
      - echo "Building..."
  # testsuite
  test_suite:
    cmds:
      - echo "Testing..."
  docker_stuff:
    # above cmds section
    cmds:
      - echo "Docker stuff"
  with_vars:
    cmds:
      - echo "{{.VALUE}}"
    vars:
      VALUE: test
env:
  NODE_ENV: development
includes:
  - ./common.yml
vars:
  PROJECT: myproject
  lowercase_var: should be uppercase
  another_var: value
tasks_with_templates:
  # greet task
  greet:
    cmds:
      - echo "Hello {{ .NAME }}" # Template variable
      - |
        echo "Project: {{ .PROJECT }}"
version: '3' # version section
